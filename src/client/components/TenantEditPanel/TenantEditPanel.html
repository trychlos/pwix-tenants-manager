<template name="TenantEditPanel">
    <div class="TenantEditPanel">

        {{> Tabbed (parmsTabbed) }}

        <div class="d-flex flex-row justify-content-between">
            {{> FormsMessager (parmsMessager) }}
            {{#unless isModal }}
                <div>
                    <button class="btn {{ saveClass }} ui-mt025 {{ saveDisabled }} js-save" type="button">{{ saveLabel }}</button>
                </div>
            {{/unless}}
        </div>

    </div>
</template>

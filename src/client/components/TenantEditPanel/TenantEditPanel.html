<template name="TenantEditPanel">
    <div class="TenantEditPanel">

        {{> Tabbed (parmsTabbed) }}

        {{> FormsMessager (parmsMessager) }}

        {{#unless isModal }}
            <div class="d-flex justify-content-end">
                <button class="btn {{ saveClass }} js-save" type="button">{{ saveLabel }}</button>
            </div>
        {{/unless}}

    </div>
</template>
